  <script>
  (function(){
    // Safety net: some pre-launch forms momentarily lose scroll position while typing.
    // This preserves the visitor's scroll position across any such re-render, without
    // touching the page's own logic.
    var lastY = null;
    function capture(){ lastY = window.scrollY; }
    function restore(){
      if (lastY === null) return;
      var y = lastY;
      var fix = function(){ if (Math.abs(window.scrollY - y) > 2) window.scrollTo(0, y); };
      requestAnimationFrame(function(){ fix(); requestAnimationFrame(fix); });
      setTimeout(fix, 50);
      setTimeout(fix, 150);
    }
    document.addEventListener('input', function(){ capture(); restore(); }, true);
    document.addEventListener('change', function(){ capture(); restore(); }, true);
  })();
  </script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n        benefits:[\n          {t:'ملف مهني يعرض أعمالك', d:'مساحة أنيقة تُظهر خبرتك وأسلوبك.'},\n          {t:'عملاء يبحثون عنك', d:'جمهور يقدّر الخبرة الموثوقة والذوق الرفيع.'},\n          {t:'إدارة الحجوزات', d:'نظّم مواعيدك وخدماتك بسهولة من لوحة واحدة.'},\n          {t:'نموّ ضمن منظومة فاخرة', d:'كن جزءاً من منصة تليق باسمك.'}\n        ],\n        policy:'يجب ألا تتضمن الخدمات المعروضة أي ادعاءات طبية أو إجراءات تتطلب ترخيصاً طبياً ما لم تُقدَّم من ممارس أو جهة مرخصة نظاماً، وتخضع الحسابات للمراجعة قبل التفعيل.',\n        formTitle:'سجّل اهتمامك', specialty:'التخصص', experience:'سنوات الخبرة', locations:'أماكن تقديم الخدمة',\n        portfolio:'رابط أعمالك — إنستقرام أو تيك توك أو ملف أعمال (اختياري)', license:'هل لديك وثيقة عمل حر أو ترخيص؟',\n        submit:'سجّل اهتمامك', note:'سيتواصل معك فريقنا قبل الإطلاق.',\n        success:'تم تسجيل اهتمامك — سيتواصل فريق نيفلا معك عند فتح مرحلة تأهيل الخبراء وفناني التجميل.',\n        specialtyOptions:['مكياج','عناية بالبشرة غير طبية','شعر','أظافر','رموش وحواجب','أخرى'],\n        experienceOptions:['أقل من 3','3–7','أكثر من 7'],\n        locationOptions:['صالون','منزلي','لدى العميل','أونلاين'],\n        licenseOptions:['نعم','قيد الإصدار','غير منطبق']\n      },\n      styleguide:{title:'دليل الأنماط', sub:'الألوان والخطوط والمكونات المستخدمة في نيفلا.', colorsTitle:'الألوان', typeTitle:'الطباعة', buttonsTitle:'الأزرار', cardsTitle:'البطاقات', fieldsTitle:'حقول النماذج', iconsTitle:'الأيقونات'},\n      legal:{\n        lastUpdated:'آخر تحديث: 9 يوليو 2026',\n        privacy:{\n          title:'سياسة الخصوصية',\n          intro:'تحترم شركة ميريديان جلو («الشركة»)، المالكة والمشغلة لمنصة نيفلا («المنصة»)، خصوصية زوار هذا الموقع، وتلتزم بحماية بياناتهم الشخصية وفق نظام حماية البيانات الشخصية في المملكة العربية السعودية. توضح هذه السياسة كيفية جمع بياناتك واستخدامها خلال مرحلة ما قبل الإطلاق.',\n          sections:[\n            {h:'١. البيانات التي نجمعها', bullets:['بيانات تسجيل الاهتمام التي تقدمها طوعاً عبر النماذج، مثل: الاسم، البريد الإلكتروني، رقم الجوال (لنماذج الشركاء)، المدينة، وبيانات النشاط للشركاء (اسم النشاط ونوعه، فئات المنتجات أو الخدمات، الروابط المهنية).','بيانات تقنية عامة عند التصفح، مثل نوع الجهاز والمتصفح ومصدر الزيارة.'], after:'لا نطلب في هذه المرحلة أي مستندات رسمية أو صور شخصية أو بيانات حساسة، ولا نطلب كلمات مرور.'},\n            {h:'٢. أغراض الاستخدام', bullets:['التواصل معك بخصوص إطلاق المنصة والخدمات ذات الصلة.','مراجعة طلبات اهتمام الشركاء والتحضير لمرحلة التأهيل.','تحسين تجربة الموقع وقياس فعالية الحملات التعريفية.'], after:'لا نبيع بياناتك الشخصية، ولا نشاركها مع جهات أخرى لأغراضها التسويقية.'},\n            {h:'٣. الأساس النظامي للمعالجة', p:'نعالج بياناتك بناءً على موافقتك الصريحة عند التسجيل، ويمكنك سحب موافقتك في أي وقت.'},\n            {h:'٤. مشاركة البيانات', p:'قد نستعين بمزودي خدمات موثوقين (مثل خدمات الاستضافة والبريد) لمعالجة البيانات نيابة عنا وبالقدر اللازم فقط، مع إلزامهم بحمايتها والتقيد بأحكام النظام، بما في ذلك أحكام نقل البيانات خارج المملكة عند انطباقها.'},\n            {h:'٥. الاحتفاظ بالبيانات', p:'نحتفظ بالبيانات للمدة اللازمة لتحقيق الأغراض المذكورة أعلاه، أو حتى سحب موافقتك أو طلبك حذفها، ما لم يوجب النظام خلاف ذلك.'},\n            {h:'٦. حقوقك', p:'وفق نظام حماية البيانات الشخصية، لك الحق في: العلم بكيفية معالجة بياناتك، وطلب الوصول إليها أو الحصول على نسخة منها، وطلب تصحيحها أو تحديثها، وطلب إتلافها، وسحب موافقتك على التواصل في أي وقت. لممارسة أي من حقوقك، تواصل معنا عبر البريد المذكور أدناه، ولك عند الاقتضاء تقديم شكوى إلى الجهة المختصة بحماية البيانات الشخصية.'},\n            {h:'٧. حماية القُصّر', p:'هذا الموقع غير موجه لمن هم دون الثامنة عشرة، ولا نجمع بياناتهم عن قصد، وسنحذف أي بيانات يتبين أنها كذلك.'},\n            {h:'٨. أمن البيانات', p:'نطبق تدابير تقنية وتنظيمية مناسبة لحماية البيانات من الوصول أو الاستخدام غير المصرح به.'},\n            {h:'٩. ملفات تعريف الارتباط', p:'قد يستخدم الموقع ملفات تعريف ارتباط أو أدوات قياس أساسية لتحسين التجربة وفهم مصادر الزيارات، ويمكنك ضبط متصفحك لرفضها.'},\n            {h:'١٠. تحديث السياسة', p:'قد نحدّث هذه السياسة من وقت لآخر، ويُنشر التحديث في هذه الصفحة مع تاريخه.'},\n            {h:'١١. التواصل', p:'لأي استفسار أو طلب يتعلق بالخصوصية، راسلنا على: hello@meridianglow.sa بعنوان «طلب خصوصية».'}\n          ]\n        },\n        terms:{\n          title:'الشروط والأحكام',\n          sections:[\n            {h:'١. التعريف والقبول', p:'هذا موقع تعريفي لمرحلة ما قبل إطلاق منصة نيفلا، المملوكة والمشغلة من شركة ميريديان جلو («الشركة»). باستخدامك هذا الموقع فإنك توافق على هذه الشروط وعلى سياسة الخصوصية.'},\n            {h:'٢. طبيعة الموقع والمحتوى', p:'المحتوى المعروض تعريفي لمنصة قيد التطوير. الخدمات والمزايا الموصوفة قابلة للتعديل أو التغيير أو التأجيل دون إشعار مسبق، ولا يُعد أي محتوى في الموقع التزاماً بموعد إطلاق محدد أو نطاق خدمات معين.'},\n            {h:'٣. تسجيل الاهتمام', p:'نماذج الموقع مخصصة لجمع الاهتمام المبكر فقط. لا يُعد تسجيل الاهتمام إنشاء حساب، ولا قبولاً نهائياً، ولا اتفاقية شراكة، ولا يرتب التزاماً تعاقدياً على أي طرف. يخضع تأهيل الشركاء وقبولهم لتقدير الشركة ومتطلباتها النظامية والتشغيلية. أنت مسؤول عن صحة ودقة البيانات التي تقدمها.'},\n            {h:'٤. العروض الترويجية', p:'أي ميزة انضمام مبكر يُعلن عنها في الموقع تخضع لشروطها وتفاصيلها التي تُعلن عند الإطلاق.'},\n            {h:'٥. المحتوى الإرشادي والذكاء الاصطناعي', p:'أي محتوى أو أدوات مدعومة بالذكاء الاصطناعي تُعرض لأغراض إرشادية وتجريبية، ولا تُعد تشخيصاً طبياً ولا استشارة طبية ولا بديلاً عن مختص مرخص.'},\n            {h:'٦. استقلال مقدمي الخدمات', p:'التجار والعيادات والأطباء وخبراء وفنانو التجميل المشاركون في المنصة أطراف مستقلون، ويتحملون المسؤولية الكاملة عن خدماتهم ومنتجاتهم وتراخيصهم وممارساتهم المهنية.'},\n            {h:'٧. الملكية الفكرية', p:'«نيفلا» وشعارها وعلامتها التجارية وجميع محتويات الموقع مملوكة لشركة ميريديان جلو أو مرخصة لها، ولا يجوز نسخها أو استخدامها دون إذن كتابي مسبق.'},\n            {h:'٨. الاستخدام المقبول', p:'يُحظر إساءة استخدام الموقع أو نماذجه، بما في ذلك تقديم بيانات مضللة أو انتحال صفة الغير أو أي محاولة للإضرار بالموقع أو مستخدميه.'},\n            {h:'٩. الروابط الخارجية', p:'قد يتضمن الموقع روابط لمنصات خارجية (مثل حسابات التواصل الاجتماعي)، ولا تتحمل الشركة مسؤولية محتواها أو ممارساتها.'},\n            {h:'١٠. حدود المسؤولية', p:'يُقدَّم الموقع «كما هو»، ولا تتحمل الشركة — إلى الحد الذي تجيزه الأنظمة — مسؤولية أي أضرار مباشرة أو غير مباشرة تنشأ عن استخدام الموقع أو تعذر استخدامه أو الاعتماد على محتواه التعريفي.'},\n            {h:'١١. تعديل الشروط', p:'يجوز للشركة تحديث هذه الشروط في أي وقت، ويسري التحديث من تاريخ نشره في هذه الصفحة.'},\n            {h:'١٢. النظام الواجب التطبيق', p:'تخضع هذه الشروط وتُفسر وفق أنظمة المملكة العربية السعودية، ويختص بالفصل في أي نزاع ينشأ عنها الجهات القضائية المختصة في المملكة.'},\n            {h:'١٣. التواصل', p:'لأي استفسار حول هذه الشروط: hello@meridianglow.sa'}\n          ]\n        },\n        contact:{\n          title:'تواصل معنا',\n          intro:'يسعدنا تواصلك خلال مرحلة الاستعداد لإطلاق نيفلا. نسعى للرد خلال أيام العمل الرسمية.',\n          cards:[\n            {label:'الاستفسارات العامة', value:'hello@meridianglow.sa', href:'mailto:hello@meridianglow.sa', ltr:true},\n            {label:'الشراكات', value:'partnerships@meridianglow.sa', href:'mailto:partnerships@meridianglow.sa', ltr:true},\n            {label:'الهاتف', value:'+966 11 450 9803', href:'tel:+966114509803', ltr:true},\n            {label:'الجوال وواتساب', value:'+966 50 411 1020', href:'https://wa.me/966504111020', ltr:true},\n            {label:'المقر', value:'الرياض، المملكة العربية السعودية', href:'', ltr:false},\n            {label:'طلبات الخصوصية', value:'عبر البريد العام بعنوان «طلب خصوصية»', href:'mailto:hello@meridianglow.sa?subject=%D8%B7%D9%84%D8%A8%20%D8%AE%D8%B5%D9%88%D8%B5%D9%8A%D8%A9', ltr:false}\n          ],\n          partnershipsExtra:'جهات الشراكة الأخرى (استثمار، إعلام، تقنية، توريد): راسلونا على بريد الشراكات.',\n          trustLink:'اقرأ عن الثقة والخصوصية',\n          whatsappLabel:'تواصل عبر واتساب',\n          registerTitle:'سجّل اهتمامك مباشرة',\n          regist
